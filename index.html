<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Veritan">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a1a">
<title>Veritan — телефон</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f4f0; color: #1a1a1a; padding-bottom: 40px; }
  .top { position: sticky; top: 0; z-index: 5; background: #1a1a1a; color: #fff; padding: calc(env(safe-area-inset-top, 0px) + 14px) 16px 12px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .top .brand { font-size: 17px; font-weight: 800; letter-spacing: .02em; }
  .top .brand b { color: #FEDC39; }
  .top button { background: rgba(255,255,255,.12); border: none; color: #fff; border-radius: 9999px; padding: 8px 14px; font-size: 14px; font-family: inherit; font-weight: 700; }
  .age { font-size: 11px; color: rgba(255,255,255,.55); margin-top: 2px; }
  .tabs { display: flex; background: #fff; border-bottom: 1px solid #e6e6e2; position: sticky; top: 0; z-index: 4; }
  .tabs button { flex: 1; background: none; border: none; padding: 13px 4px 11px; font-size: 13.5px; font-weight: 800; color: #999; font-family: inherit; border-bottom: 2.5px solid transparent; }
  .tabs button.on { color: #1a1a1a; border-bottom-color: #FEDC39; }
  .wrap { padding: 14px 14px 0; max-width: 560px; margin: 0 auto; }
  .card { background: #fff; border: 1px solid #ebebe7; border-radius: 14px; padding: 12px 14px; margin-bottom: 10px; }
  .card .ttl { font-size: 14.5px; font-weight: 800; line-height: 1.35; }
  .card .meta { font-size: 12.5px; color: #777; margin-top: 5px; line-height: 1.6; }
  .card .meta a { color: #0a6e8a; text-decoration: none; font-weight: 700; }
  .row { display: flex; gap: 8px; margin-top: 10px; }
  .b { flex: 1; border: none; border-radius: 10px; padding: 11px 8px; font-size: 13.5px; font-weight: 800; font-family: inherit; }
  .b-done { background: #e8f5ee; color: #1a8a55; }
  .b-fail { background: #fdecec; color: #c62828; }
  .badge { display: inline-block; font-size: 11px; font-weight: 800; border-radius: 9999px; padding: 3px 10px; margin-bottom: 6px; }
  .bg-in { background: #e8f5ee; color: #1a8a55; }
  .bg-out { background: #fdecec; color: #c62828; }
  .bg-unk { background: #fff4e0; color: #b46b00; }
  .bg-done { background: #f0f0ec; color: #999; }
  .sec { font-size: 11.5px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; color: #a5a5a0; margin: 18px 2px 8px; }
  .empty { text-align: center; color: #b5b5b0; font-size: 13px; padding: 40px 20px; }
  .fab { position: fixed; right: 18px; bottom: calc(env(safe-area-inset-bottom, 0px) + 18px); width: 58px; height: 58px; border-radius: 50%; background: #1a1a1a; color: #FEDC39; font-size: 30px; border: none; box-shadow: 0 8px 24px rgba(0,0,0,.28); z-index: 6; }
  .sheet-bg { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 7; display: none; }
  .sheet { position: fixed; left: 0; right: 0; bottom: 0; background: #fff; border-radius: 18px 18px 0 0; padding: 18px 16px calc(env(safe-area-inset-bottom, 0px) + 18px); z-index: 8; display: none; }
  .sheet h3 { font-size: 16px; font-weight: 800; margin-bottom: 12px; }
  .sheet label { display: block; font-size: 11.5px; font-weight: 800; color: #777; margin: 10px 0 4px; }
  .sheet input, .sheet textarea { width: 100%; font-family: inherit; font-size: 15px; padding: 11px 12px; border: 1px solid #ddd; border-radius: 10px; outline: none; background: #fafaf8; }
  .sheet .save { width: 100%; margin-top: 16px; background: #1a1a1a; color: #FEDC39; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 800; font-family: inherit; }
  .note { font-size: 11.5px; color: #999; line-height: 1.5; margin-top: 8px; }
  .pending { opacity: .55; }
  .toast { position: fixed; left: 50%; transform: translateX(-50%); bottom: calc(env(safe-area-inset-bottom, 0px) + 90px); background: #1a1a1a; color: #fff; font-size: 13px; font-weight: 700; border-radius: 9999px; padding: 10px 20px; z-index: 9; opacity: 0; transition: opacity .3s; pointer-events: none; max-width: 88vw; text-align: center; }
  .gear { background: none; border: none; color: rgba(255,255,255,.6); font-size: 18px; padding: 4px; }
</style>
</head>
<body>

<div class="top">
  <div>
    <div class="brand">Veritan <b>📱</b></div>
    <div class="age" id="age">—</div>
  </div>
  <div style="display:flex;align-items:center;gap:6px;">
    <button class="gear" onclick="openCfg()">⚙️</button>
    <button onclick="refresh()" id="refBtn">🔄 Обновить</button>
  </div>
</div>

<div class="tabs">
  <button id="tb-tasks" class="on" onclick="setTab('tasks')">📋 Задачи</button>
  <button id="tb-stock" onclick="setTab('stock')">🔔 Наличие</button>
  <button id="tb-orders" onclick="setTab('orders')">🛒 Заказы</button>
</div>

<div class="wrap" id="main"><div class="empty">Загружаю…</div></div>

<button class="fab" id="fab" onclick="openAdd()">+</button>

<div class="sheet-bg" id="sheetBg" onclick="closeSheets()"></div>

<!-- Add task -->
<div class="sheet" id="addSheet">
  <h3>Новая задача</h3>
  <label>Заголовок *</label><input id="fTitle" placeholder="De sunat când…">
  <label>Телефон клиента</label><input id="fPhone" inputmode="tel" placeholder="+373 …">
  <label>Код товара</label><input id="fCode" placeholder="12.4018">
  <label>Заметка</label><textarea id="fDesc" rows="2" placeholder="Детали…"></textarea>
  <button class="save" onclick="addTask()">Сохранить задачу</button>
  <div class="note">Задача попадёт на компьютер при ближайшей синхронизации (обычно до 5 минут).</div>
</div>

<!-- Settings -->
<div class="sheet" id="cfgSheet">
  <h3>Подключение</h3>
  <label>GitHub токен</label><input id="cT" placeholder="ghp_…">
  <label>ID хранилища (gist)</label><input id="cG" placeholder="например 1a2b3c…">
  <button class="save" onclick="saveCfg()">Сохранить</button>
  <div class="note">Проще всего: на компьютере в расширении нажми «Скопировать секретную ссылку для iPhone» и открой её здесь — всё заполнится само.</div>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  'use strict';
  var API = 'https://api.github.com';
  var state = null;       // last snapshot from the computer
  var tab = 'tasks';
  var cfg = null;         // { t: token, g: gistId }

  // ── config: from #cfg= fragment (link generated by the extension) or localStorage ──
  function loadCfg() {
    try {
      var h = location.hash || '';
      var m = h.match(/#cfg=([A-Za-z0-9+/=]+)/);
      if (m) {
        var c = JSON.parse(atob(m[1]));
        if (c && c.t && c.g) {
          localStorage.setItem('vp_cfg', JSON.stringify(c));
          history.replaceState(null, '', location.pathname + location.search);   // strip the secret from the URL
        }
      }
    } catch (e) {}
    try { cfg = JSON.parse(localStorage.getItem('vp_cfg') || 'null'); } catch (e) { cfg = null; }
    if (cfg && (!cfg.t || !cfg.g)) cfg = null;
  }

  function toast(t) {
    var el = document.getElementById('toast');
    el.textContent = t; el.style.opacity = '1';
    clearTimeout(toast._tm); toast._tm = setTimeout(function () { el.style.opacity = '0'; }, 2600);
  }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]; }); }
  function telHref(p) { return 'tel:' + String(p || '').replace(/[^+\d]/g, ''); }
  function agoText(ms) {
    var s = Math.floor((Date.now() - ms) / 1000);
    if (s < 90) return 'только что';
    if (s < 3600) return Math.floor(s / 60) + ' мин назад';
    if (s < 86400) return Math.floor(s / 3600) + ' ч назад';
    return Math.floor(s / 86400) + ' дн назад';
  }

  // ── gist I/O ──
  function gh(method, path, body) {
    return fetch(API + path, {
      method: method,
      headers: { 'Authorization': 'Bearer ' + cfg.t, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined
    }).then(function (r) { return r.text().then(function (t) { var j = null; try { j = JSON.parse(t); } catch (e) {} return { status: r.status, json: j }; }); });
  }
  function fetchState() {
    return gh('GET', '/gists/' + cfg.g).then(function (r) {
      if (r.status !== 200 || !r.json || !r.json.files) throw new Error('gist ' + r.status);
      var f = r.json.files['state.json'];
      if (!f) throw new Error('нет state.json');
      if (f.truncated && f.raw_url) return fetch(f.raw_url).then(function (rr) { return rr.json(); });
      try { return JSON.parse(f.content || '{}'); } catch (e) { return {}; }
    });
  }
  // ops queue: survives offline, re-sent on every refresh until accepted
  function opsQueue() { try { return JSON.parse(localStorage.getItem('vp_ops') || '[]'); } catch (e) { return []; } }
  function opsSave(q) { localStorage.setItem('vp_ops', JSON.stringify(q)); }
  function opPush(op) {
    op.oid = 'o' + Date.now() + Math.floor(Math.random() * 10000);
    op.ts = Date.now();
    var q = opsQueue(); q.push(op); opsSave(q);
    sendOps();
  }
  function sendOps() {
    var q = opsQueue();
    if (!q.length || !cfg) return Promise.resolve();
    return gh('GET', '/gists/' + cfg.g).then(function (r) {
      if (r.status !== 200 || !r.json || !r.json.files) throw new Error('gist ' + r.status);
      var cur = []; try { cur = (JSON.parse((r.json.files['ops.json'] || {}).content || '{"ops":[]}') || {}).ops || []; } catch (e) { cur = []; }
      var have = {}; cur.forEach(function (o) { if (o && o.oid) have[o.oid] = 1; });
      q.forEach(function (o) { if (!have[o.oid]) cur.push(o); });
      return gh('PATCH', '/gists/' + cfg.g, { files: { 'ops.json': { content: JSON.stringify({ ops: cur }) } } }).then(function (p) {
        if (p.status !== 200) throw new Error('patch ' + p.status);
        opsSave([]);
      });
    }).catch(function () { toast('⚠ Не отправилось — попробую при следующем обновлении'); });
  }

  // ── rendering ──
  function setTab(t) {
    tab = t;
    ['tasks', 'stock', 'orders'].forEach(function (x) { document.getElementById('tb-' + x).className = (x === t) ? 'on' : ''; });
    document.getElementById('fab').style.display = (t === 'tasks') ? '' : 'none';
    render();
  }
  window.setTab = setTab;

  function isActive(t) { return t && t.status !== 'done' && t.status !== 'failed'; }
  function pendingIds() { var p = {}; opsQueue().forEach(function (o) { if (o.op === 'status' && o.id) p[o.id] = o.status; }); return p; }
  function pendingAdds() { return opsQueue().filter(function (o) { return o.op === 'add'; }).map(function (o) { return o.task; }); }

  function render() {
    var box = document.getElementById('main');
    document.getElementById('age').textContent = state && state.updatedAt
      ? ('данные с компьютера · ' + agoText(state.updatedAt)) : 'нет данных — нажми Обновить';
    if (!cfg) { box.innerHTML = '<div class="empty">Не настроено.<br>Открой секретную ссылку из расширения<br>или введи данные через ⚙️.</div>'; return; }
    if (!state) { box.innerHTML = '<div class="empty">Загружаю…</div>'; return; }
    if (tab === 'tasks') renderTasks(box);
    else if (tab === 'stock') renderStock(box);
    else renderOrders(box);
  }

  function taskCard(t, pend) {
    var st = pend[t.id] || t.status;
    var closed = st === 'done' || st === 'failed';
    var meta = [];
    if (t.phone) meta.push('📞 <a href="' + telHref(t.phone) + '">' + esc(t.phone) + '</a>');
    if (t.code) meta.push('🏷 ' + esc(t.code));
    if (t.deadline) meta.push('⏰ ' + esc(String(t.deadline).replace('T', ' ')));
    if (t.desc) meta.push(esc(t.desc));
    var badge = closed ? '<span class="badge bg-done">' + (st === 'done' ? 'Выполнено' : 'Не выполнено') + (pend[t.id] ? ' · отправляется…' : '') + '</span>' : '';
    var btns = closed ? '' :
      '<div class="row">' +
        '<button class="b b-done" onclick="opStatus(\'' + t.id + '\',\'done\')">✅ Выполнено</button>' +
        '<button class="b b-fail" onclick="opStatus(\'' + t.id + '\',\'failed\')">✖ Не смог</button>' +
      '</div>';
    return '<div class="card' + (t._pending ? ' pending' : '') + '">' + badge +
      '<div class="ttl">' + esc(t.title) + (t._pending ? ' <span style="font-weight:400;color:#aaa;font-size:11px;">· отправляется…</span>' : '') + '</div>' +
      (meta.length ? '<div class="meta">' + meta.join(' &nbsp;·&nbsp; ') + '</div>' : '') + btns + '</div>';
  }

  function renderTasks(box) {
    var pend = pendingIds();
    var adds = pendingAdds().map(function (t) { t = JSON.parse(JSON.stringify(t)); t._pending = true; return t; });
    var all = adds.concat((state.tasks || []).filter(function (t) { return t && t.id; }));
    var act = all.filter(function (t) { return isActive(t) && !pend[t.id]; });
    var done = all.filter(function (t) { return !isActive(t) || pend[t.id]; }).slice(0, 10);
    var h = '';
    h += '<div class="sec">В работе — ' + act.length + '</div>';
    h += act.length ? act.map(function (t) { return taskCard(t, pend); }).join('') : '<div class="empty">Активных задач нет 🎉</div>';
    if (done.length) { h += '<div class="sec">Закрытые (последние)</div>' + done.map(function (t) { return taskCard(t, pend); }).join(''); }
    box.innerHTML = h;
  }

  function renderStock(box) {
    var stock = (state && state.stock) || {};
    var watched = (state.tasks || []).filter(function (t) { return t && t.watchStock && isActive(t) && (t.link || t.adminLink); });
    if (!watched.length) { box.innerHTML = '<div class="empty">Нет товаров на отслеживании</div>'; return; }
    box.innerHTML = '<div class="sec">Отслеживание наличия — ' + watched.length + '</div>' + watched.map(function (t) {
      var s = stock[t.id] || {};
      var need = parseFloat(t.needQty) || 0;
      var badge;
      if (s.status === 'in' && need > 0) {
        if (s.qty != null && parseFloat(s.qty) >= need) badge = '<span class="badge bg-in">✓ Достаточно: ' + esc(String(s.qty)) + ' (нужно ' + need + ')</span>';
        else if (s.qty != null) badge = '<span class="badge bg-unk">⏳ Мало: ' + esc(String(s.qty)) + ' из ' + need + '</span>';
        else badge = '<span class="badge bg-unk">⏳ Количество неизвестно</span>';
      } else {
        badge = s.status === 'in' ? '<span class="badge bg-in">✓ В наличии' + (s.qty != null ? ': ' + esc(String(s.qty)) + ' шт' : '') + '</span>'
              : s.status === 'out' ? '<span class="badge bg-out">✗ Нет в наличии</span>'
              : '<span class="badge bg-unk">… не проверялось</span>';
      }
      var meta = [];
      if (t.phone) meta.push('📞 <a href="' + telHref(t.phone) + '">' + esc(t.phone) + '</a>');
      if (t.code) meta.push('🏷 ' + esc(t.code));
      if (s.lastChecked) meta.push('проверено ' + agoText(s.lastChecked));
      return '<div class="card">' + badge + '<div class="ttl">' + esc(t.title || 'товар') + '</div>' +
        (meta.length ? '<div class="meta">' + meta.join(' &nbsp;·&nbsp; ') + '</div>' : '') + '</div>';
    }).join('');
  }

  function renderOrders(box) {
    var list = (state && state.orders) || [];
    if (!list.length) { box.innerHTML = '<div class="empty">Список заказов пуст<br><span style="font-size:11px;">(компьютер должен быть залогинен в админку)</span></div>'; return; }
    box.innerHTML = '<div class="sec">Последние заказы — ' + list.length + '</div>' + list.map(function (o) {
      var meta = [];
      if (o.phone) meta.push('📞 <a href="' + telHref(o.phone) + '">' + esc(o.phone) + '</a>');
      if (o.price) meta.push('💰 ' + esc(o.price) + ' лей');
      if (o.status) meta.push(esc(o.status));
      return '<div class="card"><div class="ttl">#' + esc(String(o.id)) + ' · ' + esc(o.name || o.type || '') + '</div>' +
        (meta.length ? '<div class="meta">' + meta.join(' &nbsp;·&nbsp; ') + '</div>' : '') + '</div>';
    }).join('');
  }

  // ── actions ──
  window.opStatus = function (id, st) {
    opPush({ op: 'status', id: id, status: st });
    render();
    toast(st === 'done' ? '✅ Отмечено — уйдёт на компьютер' : '✖ Отмечено — уйдёт на компьютер');
  };
  window.addTask = function () {
    var title = document.getElementById('fTitle').value.trim();
    if (!title) { toast('⚠ Нужен заголовок'); return; }
    var t = {
      id: 'p' + Date.now() + Math.floor(Math.random() * 1000),
      title: title,
      phone: document.getElementById('fPhone').value.trim(),
      code: document.getElementById('fCode').value.trim(),
      link: '', adminLink: '', needQty: 0, watchStock: false,
      desc: document.getElementById('fDesc').value.trim(),
      deadline: '', priority: 'normal', remind: 1440,
      status: 'active', note: '', snoozeUntil: 0,
      createdAt: new Date().toISOString(), doneAt: null
    };
    opPush({ op: 'add', task: t });
    ['fTitle', 'fPhone', 'fCode', 'fDesc'].forEach(function (i) { document.getElementById(i).value = ''; });
    closeSheets(); render();
    toast('📋 Задача сохранена — появится на компьютере');
  };
  window.refresh = function () {
    if (!cfg) { openCfg(); return; }
    var b = document.getElementById('refBtn'); b.disabled = true; b.textContent = '⏳…';
    sendOps().then(function () { return fetchState(); }).then(function (s) {
      state = s || {};
      // drop pending ops already reflected in the snapshot
      var q = opsQueue().filter(function (o) {
        if (o.op === 'add') return !(state.tasks || []).some(function (t) { return t && t.id === o.task.id; });
        if (o.op === 'status') { var t = (state.tasks || []).find(function (x) { return x && x.id === o.id; }); return !(t && t.status === o.status); }
        return false;
      });
      opsSave(q);
      render();
    }).catch(function (e) {
      toast('⚠ Не удалось загрузить: ' + (e && e.message ? e.message : 'ошибка'));
    }).then(function () { b.disabled = false; b.textContent = '🔄 Обновить'; });
  };

  // ── sheets ──
  window.openAdd = function () { document.getElementById('sheetBg').style.display = 'block'; document.getElementById('addSheet').style.display = 'block'; };
  window.openCfg = function () {
    document.getElementById('cT').value = cfg ? cfg.t : '';
    document.getElementById('cG').value = cfg ? cfg.g : '';
    document.getElementById('sheetBg').style.display = 'block'; document.getElementById('cfgSheet').style.display = 'block';
  };
  window.closeSheets = function () { ['sheetBg', 'addSheet', 'cfgSheet'].forEach(function (i) { document.getElementById(i).style.display = 'none'; }); };
  window.saveCfg = function () {
    var t = document.getElementById('cT').value.trim(), g = document.getElementById('cG').value.trim();
    if (!t || !g) { toast('⚠ Заполни оба поля'); return; }
    cfg = { t: t, g: g };
    localStorage.setItem('vp_cfg', JSON.stringify(cfg));
    closeSheets(); refresh();
  };

  // ── boot ──
  loadCfg();
  render();
  if (cfg) window.refresh();
  document.addEventListener('visibilitychange', function () { if (!document.hidden && cfg) window.refresh(); });
})();
</script>
</body>
</html>
